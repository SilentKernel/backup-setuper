# Copy to secrets.yaml and fill in the real values.
# This file is referenced by machines/<machine>.yaml via *_ref keys.
# chmod 600 the real file; it is gitignored.

silentbox-restic-pass: 'CHANGE-ME-shared-restic-passphrase'

silentds-hc:           'CHANGE-ME-uuid'
silentds-webdav-pass:  'CHANGE-ME-webdav-password'

online-ftp-hc:         'CHANGE-ME-uuid'
online-ftp-pass:       'CHANGE-ME-ftp-password'

hetzner-hel-hc:        'CHANGE-ME-uuid'
hetzner-fsn-hc:        'CHANGE-ME-uuid'

# Uptime Kuma push monitors — store the push URL UP TO THE TOKEN only.
# Used by machines that declare `monitor: { kind: kuma, url_ref: ... }`.
# Kuma's UI shows the URL with an example query string attached
# (…/<token>?status=up&msg=OK&ping=) — drop everything from the '?' onward.
# The scripts append their own ?status=up|down; a pasted query string is
# stripped at load time, but keeping the base clean avoids confusion.
kumabox-restic-pass:   'CHANGE-ME-shared-restic-passphrase'
kumabox-silentds-kuma: 'https://kuma.example.com/api/push/CHANGE-ME-token1'
kumabox-online-ftp-kuma: 'https://kuma.example.com/api/push/CHANGE-ME-token2'
kumabox-online-ftp-pass: 'CHANGE-ME-ftp-password'
kumabox-hetzner-kuma:  'https://kuma.example.com/api/push/CHANGE-ME-token3'
